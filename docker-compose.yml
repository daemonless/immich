#
# Immich for FreeBSD (Daemonless)
#
# Drop-in compatible with official Immich docker-compose.yml
#
# Usage:
#   1. Download .env from official Immich repo:
#      fetch https://github.com/immich-app/immich/releases/latest/download/.env
#   2. Edit .env (set UPLOAD_LOCATION, DB_PASSWORD, etc.)
#   3. Run with podman-compose up -d
#

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/daemonless/immich-server:latest
    # For hardware acceleration, add one of - platform: ... lines here if supported
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - redis
      - database
    restart: always

  # Machine Learning
  # NOTE: FreeBSD does not currently support the ML container natively (missing onnxruntime).
  # You have two options:
  # 1. Run this container on a Linux host and point immich-server to it via IMMICH_MACHINE_LEARNING_URL
  # 2. Uncomment below to try experimental FreeBSD support (CPU only, strictly experimental)
  #
  # immich-machine-learning:
  #   container_name: immich_machine_learning
  #   image: ghcr.io/daemonless/immich-ml:latest
  #   volumes:
  #     - model-cache:/cache
  #   env_file:
  #     - .env
  #   restart: always

  redis:
    container_name: immich_redis
    image: ghcr.io/daemonless/redis:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Map standard redis volume to daemonless config path
      - redis-data:/config
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/daemonless/immich-postgres:latest
    # FreeBSD Jail Annotation for PostgreSQL Shared Memory
    annotations:
      org.freebsd.jail.allow.sysvipc: "true"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      PG_DATA: /config/data
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Map standard postgres volume to daemonless config path
      - pgdata:/config
    restart: always

volumes:
  pgdata:
  model-cache:
  redis-data:
